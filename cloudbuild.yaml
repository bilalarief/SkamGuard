steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skamguard:latest'
      - '.'

  # Step 2: Push both tags to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/skamguard'

  # Step 3: Deploy to Cloud Run (always uses latest build)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'skamguard'
      - '--image'
      - 'gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--service-account'                                             
      - 'firebase-adminsdk-fbsvc@myai-gdg.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=$PROJECT_ID'
      - '--set-secrets'                                           
      - 'GOOGLE_GENAI_API_KEY=GOOGLE_GENAI_API_KEY:latest,VIRUSTOTAL_API_KEY=VIRUSTOTAL_API_KEY:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest'
      - '--allow-unauthenticated'   
      - '--quiet'

# Store built images in Artifact Registry
images:
  - 'gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/skamguard:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # faster build
