steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skamguard:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/skamguard:latest']

  # Step 3: Deploy to Cloud Run (THIS IS THE MISSING STEP)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'skamguard'
      - '--image=gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=3'
      - '--min-instances=0'

images:
  - 'gcr.io/$PROJECT_ID/skamguard:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/skamguard:latest'

options:
  logging: CLOUD_LOGGING_ONLY
